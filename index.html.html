<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Frete — Amouh Presentes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #0d1b2a 0%, #1b2838 50%, #0d2137 100%);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    padding: 28px 16px;
  }
  .container { max-width: 560px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 28px; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.06); border-radius: 50px;
    padding: 6px 18px; margin-bottom: 14px;
    border: 1px solid rgba(255,255,255,0.1); font-size: 12px;
    letter-spacing: 2px; text-transform: uppercase; opacity: 0.7;
  }
  h1 { font-size: 28px; font-weight: 700; }
  .subtitle { opacity: 0.4; margin-top: 6px; font-size: 13px; }
  .card {
    background: rgba(255,255,255,0.05); border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.09); padding: 24px; margin-bottom: 16px;
  }
  label.field-label {
    display: block; font-size: 11px; opacity: 0.5;
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;
  }
  input[type=text], input[type=number] {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.07);
    color: #fff; font-size: 14px; outline: none;
  }
  input[type=text]::placeholder, input[type=number]::placeholder { color: rgba(255,255,255,0.3); }
  #cep-input { font-size: 20px; letter-spacing: 4px; margin-bottom: 6px; }
  .cep-info { font-size: 12px; color: #a5b4fc; min-height: 18px; margin-bottom: 16px; }
  .local-box {
    background: rgba(99,102,241,0.06); border: 1px solid rgba(99,102,241,0.15);
    border-radius: 12px; padding: 14px; margin-bottom: 24px;
  }
  .local-box .field-label { margin-bottom: 10px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid-label { font-size: 11px; opacity: 0.45; display: block; margin-bottom: 3px; }
  /* Autocomplete */
  .autocomplete-wrap { position: relative; margin-bottom: 16px; }
  #produto-input { width: 100%; }
  #autocomplete-list {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: #1e2540; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; z-index: 100; max-height: 260px; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); display: none;
  }
  .autocomplete-item {
    padding: 10px 14px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .autocomplete-item:hover { background: rgba(255,255,255,0.07); }
  .autocomplete-item .item-name { font-size: 13px; color: #fff; }
  .autocomplete-item .item-info { font-size: 11px; color: #8b8fa8; margin-top: 2px; }
  /* Itens */
  #itens-lista { margin-top: 16px; }
  .item-row {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.04); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 8px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .item-info { flex: 1; min-width: 0; }
  .item-nome { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-detalhe { font-size: 11px; opacity: 0.45; margin-top: 2px; }
  .qtd-ctrl { display: flex; align-items: center; gap: 6px; }
  .qtd-btn {
    width: 28px; height: 28px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06); color: #fff;
    cursor: pointer; font-size: 16px; line-height: 1;
  }
  .qtd-input {
    width: 40px; text-align: center; padding: 4px;
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.07); color: #fff; font-size: 14px;
  }
  .remove-btn {
    background: rgba(239,68,68,0.15); border: none; color: #fca5a5;
    border-radius: 8px; padding: 4px 8px; cursor: pointer; font-size: 12px;
  }
  /* Botão calcular */
  #btn-calcular {
    width: 100%; padding: 15px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 16px;
  }
  #btn-calcular:hover { opacity: 0.9; }
  /* Erro */
  #erro-msg {
    background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25);
    border-radius: 10px; padding: 11px 14px; color: #fca5a5;
    font-size: 13px; margin-top: 14px; display: none;
  }
  /* Resultado */
  #resultado { display: none; }
  .caixa-box {
    border-radius: 12px; padding: 13px 16px; margin-bottom: 16px;
  }
  .caixa-titulo { font-size: 11px; opacity: 0.5; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
  .caixa-nome { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
  .caixa-detalhe { opacity: 0.5; font-size: 12px; margin-top: 6px; line-height: 1.7; }
  .caixa-aviso { color: #fca5a5; font-size: 12px; margin-top: 8px; font-weight: 600; }
  .correios-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modalidade-card { border-radius: 14px; padding: 14px; }
  .modalidade-label { font-weight: 700; font-size: 13px; margin-bottom: 12px; }
  .modalidade-prazo { font-size: 11px; opacity: 0.5; margin-bottom: 10px; }
  .linha-frete { display: flex; justify-content: space-between; opacity: 0.7; font-size: 12px; margin-bottom: 5px; }
  .linha-total {
    display: flex; justify-content: space-between;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 6px; margin-top: 2px;
  }
  .total-label { font-weight: 700; color: #fff; }
  .total-valor { font-weight: 700; font-size: 15px; }
  .nao-disponivel { opacity: 0.4; font-size: 12px; }
  /* Locais */
  .locais-titulo { font-size: 11px; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 10px; }
  .local-row {
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(251,191,36,0.07); border: 1px solid rgba(251,191,36,0.2);
    border-radius: 12px; padding: 12px 16px; margin-bottom: 8px;
  }
  .local-nome { font-size: 13px; font-weight: 600; }
  .local-obs { font-size: 11px; opacity: 0.5; margin-top: 2px; }
  .local-valor { font-size: 18px; font-weight: 700; color: #fbbf24; }
  .footer { text-align: center; opacity: 0.2; font-size: 11px; margin-top: 20px; }
</style>
</head>

  { nome:"PP",  l:16,   a:11.5, c:7,   cm3:1288  },

// ─── UTILITÁRIOS ─────────────────────────────────────────────────────────────
const fmt = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').trim(); }

// ─── CEP / VIACEP ────────────────────────────────────────────────────────────
document.getElementById('cep-input').addEventListener('input', function(){
  let v = this.value.replace(/\D/g,'').slice(0,8);
  this.value = v.replace(/(\d{5})(\d)/,'$1-$2');
  if(v.length===8) buscarCep(v);
  else document.getElementById('cep-info').textContent = '';
});

async function buscarCep(cep){
  const info = document.getElementById('cep-info');
  info.textContent = '🔍 Buscando endereço...';
  try {
    const r = await fetch('https://viacep.com.br/ws/'+cep+'/json/');
    const d = await r.json();
    if(d.erro){ info.textContent = '⚠️ CEP não encontrado'; return; }
    document.getElementById('cidade-input').value = d.localidade||'';
    document.getElementById('bairro-input').value = d.bairro||'';
    info.style.color = '#86efac';
    info.textContent = '✓ '+d.logradouro+(d.complemento?' '+d.complemento:'')+' — '+d.bairro+', '+d.localidade+'/'+d.uf;
  } catch(e){
    info.style.color = '#fca5a5';
    info.textContent = '⚠️ Erro ao buscar CEP';
  }
}

// ─── AUTOCOMPLETE ─────────────────────────────────────────────────────────────
const prodInput = document.getElementById('produto-input');
const autoList  = document.getElementById('autocomplete-list');

prodInput.addEventListener('input', function(){
  const q = norm(this.value);
  if(q.length < 2){ autoList.style.display='none'; return; }
  const found = PRODUTOS_DB.filter(p => norm(p.nome).includes(q)||norm(p.codigo).includes(q)).slice(0,8);
  if(!found.length){ autoList.style.display='none'; return; }
  autoList.innerHTML = found.map(p =>
    `<div class="autocomplete-item" onclick="addItem('${p.codigo}')">
      <div class="item-name">${p.nome}</div>
      <div class="item-info">${p.codigo} · ${p.peso}kg · ${p.largura}×${p.altura}×${p.comprimento}cm</div>
    </div>`).join('');
  autoList.style.display = 'block';
});

document.addEventListener('click', e => { if(!prodInput.contains(e.target)) autoList.style.display='none'; });

function addItem(codigo){
  const p = PRODUTOS_DB.find(x => x.codigo===codigo);
  if(!p) return;
  const ex = itens.find(x => x.produto.codigo===codigo);
  if(ex){ ex.quantidade++; } else { itens.push({produto:p, quantidade:1}); }
  prodInput.value=''; autoList.style.display='none';
  renderItens();
}

function renderItens(){
  const lista = document.getElementById('itens-lista');
  const label = document.getElementById('itens-lista-label');
  label.style.display = itens.length ? 'block' : 'none';
  lista.innerHTML = itens.map((it,i) => `
    <div class="item-row">
      <div class="item-info">
        <div class="item-nome">${it.produto.nome}</div>
        <div class="item-detalhe">${it.produto.codigo} · ${it.produto.peso}kg · ${it.produto.largura}×${it.produto.altura}×${it.produto.comprimento}cm</div>
      </div>
      <div class="qtd-ctrl">
        <button class="qtd-btn" onclick="changeQtd(${i},-1)">−</button>
        <input class="qtd-input" type="number" value="${it.quantidade}" min="1" onchange="setQtd(${i},this.value)">
        <button class="qtd-btn" onclick="changeQtd(${i},1)">+</button>
      </div>
      <button class="remove-btn" onclick="removeItem(${i})">✕</button>
    </div>`).join('');
}

function changeQtd(i,delta){ itens[i].quantidade = Math.max(1,itens[i].quantidade+delta); renderItens(); }
function setQtd(i,v){ itens[i].quantidade = Math.max(1,parseInt(v)||1); renderItens(); }
function removeItem(i){ itens.splice(i,1); renderItens(); }

// ─── LÓGICA DE CAIXA ─────────────────────────────────────────────────────────
function pesoCubado(l,a,c){ return l*a*c/6000; }

function sugerirCaixas(volTotal, pesoTotal){
  const caixaUnica = CAIXAS.find(c => c.cm3 >= volTotal);
  if(caixaUnica){
    const pc = pesoCubado(caixaUnica.l,caixaUnica.a,caixaUnica.c);
    const pesoFinal = Math.max(pesoTotal, pc);
    const soma = caixaUnica.l+caixaUnica.a+caixaUnica.c;
    const ladoMax = Math.max(caixaUnica.l,caixaUnica.a,caixaUnica.c);
    let aviso = null;
    if(soma>200) aviso=`Soma das dimensões (${soma}cm) excede 200cm`;
    else if(ladoMax>100) aviso=`Lado maior (${ladoMax}cm) excede 100cm`;
    else if(pesoFinal>30) aviso=`Peso (${pesoFinal.toFixed(2)}kg) excede 30kg`;
    return {tipo:'unica',caixas:[{caixa:caixaUnica,qtd:1}],pesoFinal,pcubado:pc,numCaixas:1,custoTotal:CUSTO_CAIXA,aviso};
  }
  const caixaMax = CAIXAS[CAIXAS.length-1];
  const numCaixas = Math.ceil(volTotal/caixaMax.cm3);
  const pesoPorCaixa = pesoTotal/numCaixas;
  const pc = pesoCubado(caixaMax.l,caixaMax.a,caixaMax.c);
  const pesoFinal = Math.max(pesoPorCaixa,pc);
  const volRestante = volTotal-(numCaixas-1)*caixaMax.cm3;
  const caixaRest = CAIXAS.find(c => c.cm3>=volRestante)||caixaMax;
  const caixas = caixaRest.nome===caixaMax.nome
    ? [{caixa:caixaMax,qtd:numCaixas}]
    : [{caixa:caixaMax,qtd:numCaixas-1},{caixa:caixaRest,qtd:1}];
  return {tipo:'multipla',caixas,pesoFinal,pcubado:pc,numCaixas,custoTotal:CUSTO_CAIXA*numCaixas,aviso:null};
}

// ─── FRETE CORREIOS ───────────────────────────────────────────────────────────
function buscarFrete(tabela,faixas,cepNum,pesoGramas){
  const row = tabela.r.find(r => r[0]<=cepNum && cepNum<=r[1]);
  if(!row) return null;
  const precos = tabela.p[row[2]];
  let idx = faixas.findIndex(lim => pesoGramas<=lim);
  if(idx===-1){
    const exc = Math.ceil((pesoGramas-10000)/1000);
    return precos[precos.length-2]+precos[precos.length-1]*exc;
  }
  return precos[idx];
}

function calcTotal(freteBase,numCaixas){
  const custoCaixas = CUSTO_CAIXA*numCaixas;
  const subtotal = freteBase*numCaixas+custoCaixas;
  const imposto = subtotal*IMPOSTO;
  return {freteBase,freteTotal:freteBase*numCaixas,custoCaixas,imposto,total:subtotal+imposto};
}

// ─── TRANSPORTADORAS LOCAIS ───────────────────────────────────────────────────
function buscarMotoboy(cidade,bairro){
  const c=norm(cidade),b=norm(bairro);
  const r=MOTOBOY_DB.find(x=>norm(x.cidade)===c&&norm(x.bairro)===b);
  return r?r.valor:null;
}
function buscarCarro(cidade,bairro){
  const c=norm(cidade),b=norm(bairro);
  let r=CARRO_DB.find(x=>norm(x.cidade)===c&&x.bairro&&norm(x.bairro)===b);
  if(!r) r=CARRO_DB.find(x=>norm(x.cidade)===c&&!x.bairro);
  if(!r) r=CARRO_DB.find(x=>norm(x.cidade)===c);
  return r?r.valor:null;
}
function buscarDiskTenha(cidade){
  const c=norm(cidade);
  const r=DISKTENHA_DB.find(x=>norm(x.cidade)===c||norm(x.cidade).includes(c)||c.includes(norm(x.cidade)));
  return r?r.valor:null;
}

// ─── CALCULAR ─────────────────────────────────────────────────────────────────
async function calcular(){
  document.getElementById('erro-msg').style.display='none';
  document.getElementById('resultado').style.display='none';

  const cepStr = document.getElementById('cep-input').value.replace(/\D/g,'');
  if(cepStr.length!==8){ mostrarErro('CEP inválido.'); return; }
  if(!itens.length){ mostrarErro('Adicione pelo menos um produto.'); return; }

  const cepNum = parseInt(cepStr);
  const volTotal = itens.reduce((s,it)=>s+it.produto.largura*it.produto.altura*it.produto.comprimento*it.quantidade,0);
  const pesoTotal = itens.reduce((s,it)=>s+it.produto.peso*it.quantidade,0);
  const sug = sugerirCaixas(volTotal,pesoTotal);
  const pesoGramas = Math.round(sug.pesoFinal*1000);

  const pacVal  = buscarFrete(PAC_DATA, PAC_FAIXAS, cepNum, pesoGramas);
  const sedVal  = buscarFrete(SED_DATA, SED_FAIXAS, cepNum, pesoGramas);

  const cidade = document.getElementById('cidade-input').value;
  const bairro = document.getElementById('bairro-input').value;
  const mbVal  = cidade&&bairro ? buscarMotoboy(cidade,bairro) : null;
  const crVal  = cidade ? buscarCarro(cidade,bairro) : null;
  const dtVal  = cidade ? buscarDiskTenha(cidade) : null;

  if(pacVal===null&&sedVal===null&&mbVal===null&&crVal===null&&dtVal===null){
    mostrarErro('Nenhuma opção de frete encontrada para este destino.'); return;
  }

  renderResultado({sug,volTotal,pesoTotal,pesoGramas,pacVal,sedVal,mbVal,crVal,dtVal,numCaixas:sug.numCaixas});
}

function mostrarErro(msg){
  const el = document.getElementById('erro-msg');
  el.textContent=msg; el.style.display='block';
}

  grid.innerHTML = [
    {label:'PAC',val:pacVal,color:'#34d399',bg:'rgba(52,211,153,0.08)',border:'rgba(52,211,153,0.2)',prazo:'Prazo: 3–8 dias úteis'},
    {label:'SEDEX',val:sedVal,color:'#60a5fa',bg:'rgba(96,165,250,0.08)',border:'rgba(96,165,250,0.2)',prazo:'Prazo: 1–3 dias úteis'},
  ].map(({label,val,color,bg,border,prazo})=>{

        <div class="linha-frete"><span>Frete${numCaixas>1?` (${numCaixas}×)`:''}</span><span>${fmt(d.freteTotal)}</span></div>
        <div class="linha-frete"><span>Embalagem</span><span>${fmt(d.custoCaixas)}</span></div>

      `}
    </div>`;
  }).join('');

  // Locais
  const locais = [
    {label:'🏍️ Amouh Flash (Motoboy)',val:mbVal,obs:'Até 5 kits / 20 produtos'},
    {label:'🚗 Entrega de Carro',val:crVal,obs:'Grande Florianópolis'},
    {label:'📦 Disk Tenha',val:dtVal,obs:'Até 50kg · 3 dias úteis'},
  ].filter(x=>x.val!==null);

  const locaisSection = document.getElementById('locais-section');
  if(locais.length){
    locaisSection.innerHTML = `<div class="locais-titulo">Entrega Local</div>`+
      locais.map(x=>`
        <div class="local-row">
          <div><div class="local-nome">${x.label}</div><div class="local-obs">${x.obs}</div></div>
          <div class="local-valor">${fmt(x.val)}</div>
        </div>`).join('');
  } else { locaisSection.innerHTML=''; }

  document.getElementById('resultado').style.display='block';
}
